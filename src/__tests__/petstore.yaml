info:
  title: Pet Store API
  version: 1.0.0
  description: A sample OpenAPI 3 spec for the vitepress-plugin-openspec tests.
openapi: "3.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
  /pets/{petId}:
    get:
      operationId: showPetById
      summary: Info for a specific pet
      tags:
        - pets
  /owners:
    get:
      operationId: listOwners
      summary: List all owners
      tags:
        - owners
  /untagged:
    get:
      operationId: untaggedEndpoint
      summary: An endpoint with no tags
